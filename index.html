<!DOCTYPE html>
<html dir="ltr" lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Social Links Profile</title>
        <link rel="stylesheet" href="style.css" type ="text/css">
        <!-- <link rel="icon" type="image/x-icon" href="favicon.ico">   -->
        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    </head>
    <body>
        <section id="card-social">
            <div class="container">
                <div class="img-profile">
                    <img src="images/imgProfile.jpg" alt="profile picture">
                </div>
                <div class="name-location">
                    <h1 class="name">Mohamed Guenfoudi</h1>
                    <p class="location">Spain, Castilla La Mancha</p>
                </div>
                <div class="bio">
                    <p>"Front-end developer and avid reader."</p>
                </div>
                <div class="links">
                    <a class="link" href="https://github.com/MohamedGN1997" target="_blank" title="GitHub Profile">GitHub</a>
                    <a class="link" href="https://www.frontendmentor.io/profile/MohamedGN1997" target="_blank" title="FrontEnd Mentor Profile">FrontEnd Mentor</a>
                    <a class="link" href="https://www.linkedin.com/in/mohamed-guenfoudi-813343399?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank" title="LinkedIn Profile">LinkedIn</a>
                    <a class="link" href="https://www.facebook.com/guenfoudi.m" target="_blank" title="Facebook Profile">Facebook</a>
                    <a class="link" href="https://www.instagram.com/mohamed.guenfoudi?utm_source=qr&igsh=MTFoZnpqeTh4cmF1NA==" target="_blank" title="Instagram Profile">Instagram</a>
               </div>
            </div>
        </section>
    </body>
</html>
